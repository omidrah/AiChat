<div class="login-box">

  <h2>Login</h2>

  <input
    type="text"
    placeholder="Username"
    [(ngModel)]="userName"
  />

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password"
  />

  <button (click)="login()">
    Login
  </button>

  <div *ngIf="error">
    {{error}}
  </div>

</div>
