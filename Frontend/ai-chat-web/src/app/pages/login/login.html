<div class="login-page">

  <div class="login-card">

    <h1>AI Chat</h1>

    <p class="subtitle">
      ورود به سامانه
    </p>

    <div class="form-group">
      <label>نام کاربری</label>

      <input
        type="text"
        [(ngModel)]="userName"
        placeholder="نام کاربری">
    </div>

    <div class="form-group">
      <label>رمز عبور</label>

      <input
        type="password"
        [(ngModel)]="password"
        placeholder="رمز عبور">
    </div>

    <button
      (click)="login()"
      class="login-btn">

      ورود
    </button>

    <div class="error" *ngIf="error">
      {{error}}
    </div>

  </div>

</div>
