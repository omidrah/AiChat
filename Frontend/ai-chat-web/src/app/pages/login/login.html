<div class="login-page">

    <div class="login-card">

        <h1>AI Chat</h1>

        <p class="subtitle">
            لطفاً وارد حساب کاربری شوید
        </p>

        <div class="form-group">
            <label>نام کاربری</label>

            <input
                [(ngModel)]="userName"
                type="text">
        </div>

        <div class="form-group">
            <label>رمز عبور</label>

            <input
                [(ngModel)]="password"
                type="password">
        </div>

        <button
            class="login-btn"
            (click)="login()">
            ورود
        </button>

        <div class="error" *ngIf="error">
            {{error}}
        </div>

    </div>

</div>
